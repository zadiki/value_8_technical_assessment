name: Code CI & Deploy

on:
  push:
    branches:
      - main

jobs:
  # 1. Code style and syntax
  pint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Run Laravel Pint
        run: vendor/bin/pint --test --verbose

  # 2. unit and feature
  test:
    runs-on: ubuntu-latest
    needs: pint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, curl, libxml, sqlite, pdo_sqlite, bcmath
          tools: composer

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Generate Key
        run: php artisan key:generate

      # Run Unit Tests first (Isolated logic tests)
      - name: Run Unit Tests
        run: vendor/bin/phpunit --testsuite=Unit

      # Run Feature Tests (Database & Route tests)
      - name: Run Feature Tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: vendor/bin/phpunit --testsuite=Feature

  # 3. Deployment
  deploy:
    runs-on: ubuntu-latest
    needs: test # ONLY runs if BOTH Unit and Feature tests pass
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VM
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
            cd /var/www/laravel-app
            git pull origin main
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            sudo systemctl restart php8.4-fpm
            sudo systemctl restart nginx
          EOF