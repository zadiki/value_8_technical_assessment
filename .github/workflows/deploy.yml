name: Laravel CI & Deploy

on:
  push:
    branches:
      - main

env:
  # This silences the Node.js 20 warning and forces the latest runner environment
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer:v2
      - run: composer install --no-progress --prefer-dist --optimize-autoloader
      - run: vendor/bin/pint --test --verbose

  test:
    runs-on: ubuntu-latest
    needs: pint
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, dom, curl, libxml, sqlite, pdo_sqlite, bcmath
          tools: composer:v2
      - run: composer install --no-progress --prefer-dist --optimize-autoloader
      - run: php -r "file_exists('.env') || copy('.env.example', '.env');"
      - run: php artisan key:generate
      - name: Run Tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: vendor/bin/phpunit

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VM
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
            cd /var/www/laravel-app
            git pull origin main
            
            # Using 'sed' to update existing .env values instead of appending duplicates
            sed -i "s|DB_HOST=.*|DB_HOST=${{ secrets.DB_HOST }}|" .env
            sed -i "s|DB_USERNAME=.*|DB_USERNAME=${{ secrets.DB_USER }}|" .env
            sed -i "s|DB_PASSWORD=.*|DB_PASSWORD=${{ secrets.DB_PASSWORD }}|" .env
            
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            
            # Clear and rebuild cache
            php artisan optimize
            
            # Restart services
            sudo systemctl restart php8.5-fpm
            sudo systemctl restart nginx
          EOF
